name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: sonar-project-properties
        run: |
          echo "sonar-verbose=true" >> "$GITHUB_OUTPUT"
      - name: sonarqube-scan-action
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        with:
          args: >
            "-Dsonar.organization=${{ env.SONAR_ORGANIZATION }}"
            "-Dsonar.projectKey=Sonar-Support_waynekhan-net-MAC0929-docker"

            "-Dsonar.verbose=${{ steps.sonar-project-properties.outputs.sonar-verbose }}"
