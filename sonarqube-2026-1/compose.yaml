---
services:
  sonarqube-2026-1-mcp:
    container_name: sonarqube-2026-1-mcp
    depends_on:
      - sonarqube-2026-1
    image: mcp/sonarqube:latest
    restart: unless-stopped
    environment:
      SONARQUBE_HTTP_HOST: 0.0.0.0
      SONARQUBE_HTTP_PORT: 8080
      SONARQUBE_TOKEN: ${SONAR_TOKEN}
      SONARQUBE_TRANSPORT: http
      SONARQUBE_URL: http://sonarqube-2026-1:9000
    ports:
      - 19024:8080

  sonarqube-2026-1:
    container_name: sonarqube-2026-1
    depends_on:
      - sonarqube-2026-1-postgres
    image: sonarqube:2026.1.2-enterprise
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-2026-1-postgres/sonarqube?currentSchema=public
      - SONAR_JDBC_USERNAME=sonar
    stop_grace_period: 3600s
    ports:
      - 19020:9000
    volumes:
      - ./conf:/opt/sonarqube/conf
      - ./data:/opt/sonarqube/data
      - ./extensions:/opt/sonarqube/extensions
      - ./logs:/opt/sonarqube/logs

  sonarqube-2026-1-postgres:
    container_name: sonarqube-2026-1-postgres
    image: postgres:18
    environment:
      - POSTGRES_DB=sonarqube
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=sonar
    volumes:
      - var-lib-postgresql-18-docker:/var/lib/postgresql/18/docker

volumes:
  var-lib-postgresql-18-docker:
